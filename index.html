  /* ========== Reset & Base ========== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f18;
    --surface: #151724;
    --surface2: #1c1f2e;
    --border: #252836;
    --text: #e2e4ed;
    --text2: #8b8fa6;
    --text3: #5b5f76;

    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 2px 16px rgba(0,0,0,.4);

  }

  html { scroll-behavior: smooth; font-size: 15px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;

    line-height: 1.6;
    min-height: 100vh;
  }

  a { color: inherit; text-decoration: none; }

  /* ========== Header ========== */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(13,15,24,.85); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 60px;
    display: flex; align-items: center; gap: 20px;
  }
  .header .logo {
    font-size: 1.35rem; font-weight: 800; letter-spacing: -.02em;
    display: flex; align-items: center; gap: 8px; white-space: nowrap;
  }
  .header .logo .icon { color: var(--accent); font-size: 1.5rem; }
  .header .search-wrap {
    flex: 1; max-width: 480px; position: relative;
  }
  .header .search-wrap input {
    width: 100%; padding: 10px 44px 10px 16px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 24px; color: var(--text); font-size: .9rem;
    outline: none; transition: var(--transition);
  }
  .header .search-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
  .header .search-wrap .search-icon {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    color: var(--text3); font-size: 1.1rem; pointer-events: none;
  }
  .header .header-links { display: flex; gap: 12px; align-items: center; }
  .header .header-links a { color: var(--text2); font-size: .85rem; transition: var(--transition); white-space: nowrap; }
  .header .header-links a:hover { color: var(--text); }

  /* ========== Top Banner Ad ========== */
  .top-banner {
    max-width: 1280px; margin: 16px auto 0; padding: 0 24px;
  }
  .ad-slot {
    display: flex; align-items: center; justify-content: center;
    min-height: 90px;
    border: 2px dashed var(--border); border-radius: var(--radius);
    background: var(--surface); color: var(--text3);
    font-size: .85rem; letter-spacing: .04em;
    transition: var(--transition);
  }
  .ad-slot:hover { border-color: var(--accent-dim); color: var(--text2); }
  .ad-slot.top { min-height: 90px; }
  .ad-slot.sidebar { min-height: 250px; flex-direction: column; gap: 6px; }

  /* ========== Main Layout ========== */
  .main {
    max-width: 1280px; margin: 20px auto; padding: 0 24px;
    display: grid;
    grid-template-columns: 200px 1fr 300px;
    gap: 20px;
  }

  /* ========== Left Sidebar (Categories) ========== */
  .left-sidebar { position: sticky; top: 80px; align-self: start; }
  .cat-list { display: flex; flex-direction: column; gap: 2px; }
  .cat-item {
    padding: 10px 14px; border-radius: var(--radius-sm);
    color: var(--text2); font-size: .9rem; cursor: pointer;
    transition: var(--transition); display: flex; align-items: center; gap: 10px;
    border: 1px solid transparent; user-select: none;

  .cat-item:hover { background: var(--surface2); color: var(--text); }
  .cat-item.active { background: var(--accent-dim); color: var(--accent); border-color: rgba(79,224,182,.25); font-weight: 600; }
  .cat-item .emoji { font-size: 1.1rem; width: 24px; text-align: center; }
  .cat-count { margin-left: auto; font-size: .75rem; color: var(--text3); background: var(--surface2); padding: 2px 8px; border-radius: 10px; }
  .cat-item.active .cat-count { background: rgba(79,224,182,.2); color: var(--accent); }

  /* Sidebar ad inside left sidebar */
  .left-sidebar .ad-slot { margin-top: 16px; min-height: 200px; }

  /* ========== Tool Grid ========== */
  .tool-grid {

    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));

  .tool-card .card-desc { color: var(--text2); font-size: .82rem; line-height: 1.5; flex: 1; }
  .tool-card .card-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .tool-card .card-tag {

    background: var(--accent-dim); color: var(--accent); white-space: nowrap;

  .tool-card .card-tag.free { background: rgba(56,216,120,.15); color: #38d878; }
  .tool-card .card-link {
    margin-top: auto; text-align: center;
    padding: 8px; border-radius: var(--radius-sm);
    background: var(--surface2); color: var(--accent);
    font-size: .82rem; font-weight: 600; transition: var(--transition);
    border: 1px solid transparent;
  }
  .tool-card .card-link:hover { background: var(--accent-dim); border-color: rgba(79,224,182,.3); }

  /* ========== Right Sidebar (Ads) ========== */
  .right-sidebar { position: sticky; top: 80px; align-self: start; display: flex; flex-direction: column; gap: 16px; }

  /* ========== Footer ========== */
  .footer {
    text-align: center; padding: 32px 24px; color: var(--text3);
    font-size: .8rem; border-top: 1px solid var(--border);

  .mobile-cat-toggle {

    border-radius: var(--radius-sm); color: var(--text); font-size: .9rem;
    cursor: pointer; align-items: center; gap: 8px; margin-bottom: 12px;

  /* ========== Responsive ========== */
  @media (max-width: 1024px) {
    .main { grid-template-columns: 180px 1fr 240px; gap: 14px; }
  }
  @media (max-width: 860px) {
    .main { grid-template-columns: 1fr; }
    .left-sidebar, .right-sidebar, .top-banner { display: none; }
    .mobile-cat-toggle { display: flex; }
    .left-sidebar.mobile-open { display: block; position: static; margin-bottom: 16px; }
    .left-sidebar.mobile-open .ad-slot { display: none; }
    .right-sidebar.mobile-show { display: flex; flex-direction: row; gap: 12px; overflow-x: auto; }
    .right-sidebar.mobile-show .ad-slot { min-width: 250px; min-height: 150px; flex-shrink: 0; }
    .header .header-links a.hide-mobile { display: none; }
    .header { padding: 0 16px; gap: 12px; }
    .header .search-wrap { max-width: 280px; }
  }
  @media (max-width: 480px) {
    .tool-grid { grid-template-columns: 1fr; }
    .header .logo span { font-size: 1rem; }
    .header .search-wrap { max-width: 180px; }
    .header .search-wrap input { padding: 8px 36px 8px 12px; font-size: .82rem; }
  }

    { name: 'Phind',          icon: '💡', cat: 'search', desc: '面向开发者的 AI 搜索引擎，技术问答精准，代码示例丰富',                       tags: ['免费'],        url: 'https://www.phind.com' },
    { name: 'You.com',        icon: '🌍', cat: 'search', desc: '隐私优先的 AI 搜索引擎，多模型切换，个性化搜索体验',                         tags: ['免费'],        url: 'https://you.com' },
    { name: 'Monica',         icon: '🌟', cat: 'search', desc: '浏览器 AI 助手插件，Chat/搜索/总结/翻译全能，侧边栏交互',                    tags: ['免费'],        url: 'https://monica.im' },
    { name: 'MaxAI',          icon: '🤖', cat: 'search', desc: '网页 AI 增强，一键总结/翻译/改写任何网页内容，支持多模型切换',               tags: ['免费'],        url: 'https://www.maxai.me' },
  ];

  // Category definitions
  const categories = [
    { key: 'all',    emoji: '📂', label: '全部' },
    { key: 'chat',   emoji: '💬', label: '对话大模型' },
    { key: 'image',  emoji: '🎨', label: '图像设计' },
    { key: 'video',  emoji: '🎬', label: '视频生成' },
    { key: 'code',   emoji: '💻', label: '编程工具' },
    { key: 'writing',emoji: '📝', label: '写作办公' },
    { key: 'audio',  emoji: '🎧', label: '音频语音' },
    { key: 'search', emoji: '🔍', label: 'AI 搜索' },
  ];

  // Build category counts
  const catCounts = {};
  tools.forEach(t => { catCounts[t.cat] = (catCounts[t.cat] || 0) + 1; });
  catCounts['all'] = tools.length;

  // ========== DOM refs ==========
  const catList    = document.getElementById('catList');
  const toolGrid   = document.getElementById('toolGrid');
  const searchInput= document.getElementById('searchInput');
  const totalCount = document.getElementById('totalCount');
  const catToggle  = document.getElementById('mobileCatToggle');
  const leftSidebar= document.getElementById('leftSidebar');

  let activeCat = 'all';

  // ========== Render Category List ==========
  function renderCategories() {
    catList.innerHTML = categories.map(c => {
      const cnt = catCounts[c.key] || 0;
      const cls = c.key === activeCat ? 'active' : '';
      return `<div class="cat-item ${cls}" data-cat="${c.key}">
        <span class="emoji">${c.emoji}</span>${c.label}
        <span class="cat-count">${cnt}</span>
      </div>`;
    }).join('');
  }

  // ========== Render Tool Cards ==========
  function renderTools(filteredTools) {
    if (filteredTools.length === 0) {
      toolGrid.innerHTML = '<div class="no-results">🔍 没有找到匹配的工具，试试其他关键词</div>';
      totalCount.textContent = '0';
      return;
    }
    totalCount.textContent = filteredTools.length;
    toolGrid.innerHTML = filteredTools.map(t => {
      // Icon background colors per category
      const bgColors = {
        chat:    'linear-gradient(135deg, #6366f1, #8b5cf6)',
        image:   'linear-gradient(135deg, #f472b6, #e879f9)',
        video:   'linear-gradient(135deg, #fb923c, #f97316)',
        code:    'linear-gradient(135deg, #38bdf8, #0ea5e9)',
        writing: 'linear-gradient(135deg, #a78bfa, #7c3aed)',
        audio:   'linear-gradient(135deg, #34d399, #10b981)',
        search:  'linear-gradient(135deg, #fbbf24, #f59e0b)',
      };
      const bg = bgColors[t.cat] || bgColors.chat;
      const tagsHtml = t.tags.map(tag => {
        const tagClass = tag === '热门' ? 'paid' : (tag === '免费' ? 'free' : '');
        return `<span class="card-tag ${tagClass}">${tag}</span>`;
      }).join('');
      return `
        <div class="tool-card">
          <div class="card-header">
            <div class="card-icon" style="background:${bg};">${t.icon}</div>
            <span class="card-name">${t.name}</span>
          </div>
          <p class="card-desc">${t.desc}</p>
          <div class="card-tags">${tagsHtml}</div>
          <a href="${t.url}" target="_blank" rel="noopener" class="card-link" onclick="trackClick('${t.name}')">访问网站 →</a>
        </div>`;
    }).join('');
  }

  function filterTools() {
    const query = searchInput.value.toLowerCase().trim();
    let filtered = activeCat === 'all' ? [...tools] : tools.filter(t => t.cat === activeCat);
    if (query) {
      filtered = filtered.filter(t =>
        t.name.toLowerCase().includes(query) ||
        t.desc.toLowerCase().includes(query) ||
        t.tags.some(tag => tag.toLowerCase().includes(query))
      );
    }
    renderTools(filtered);
  }

  // ========== Event: Category Click ==========
  catList.addEventListener('click', e => {
    const item = e.target.closest('.cat-item');
    if (!item) return;
    activeCat = item.dataset.cat;
    renderCategories();
    filterTools();
    // Close mobile sidebar on selection
    leftSidebar.classList.remove('mobile-open');
  });

  // ========== Event: Search ==========
  searchInput.addEventListener('input', filterTools);

  // ========== Mobile Category Toggle ==========
  catToggle.addEventListener('click', () => {
    leftSidebar.classList.toggle('mobile-open');
  });

  // ========== Analytics mock ==========
  window.trackClick = function(name) {
    console.log(`[Analytics] 点击工具: ${name}`);
  };

  // ========== Init ==========
  renderCategories();
  filterTools();
})();
</script>
</body>
</html>
